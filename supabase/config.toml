# Supabase project config for TasGo
# Run `supabase start` for local dev

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "10MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "exp://localhost:19000",
  "tasgo://",
  "tasgo-staff://"
]
jwt_expiry = 3600
enable_signup = true

[auth.sms]
enable_signup = true
enable_confirmations = true

[functions.send-otp]
verify_jwt = false

[functions.verify-otp]
verify_jwt = false

[functions.create-payment]
verify_jwt = true

[functions.payment-webhook]
verify_jwt = false

[functions.assign-order]
verify_jwt = true

[functions.send-push]
verify_jwt = true

[functions.refund-order]
verify_jwt = true

[functions.translate-product]
verify_jwt = true
