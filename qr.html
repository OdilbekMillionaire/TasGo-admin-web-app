<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TasGo — Expo Go QR Code</title>
<style>
  body { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
  h2 { color: #1a1a1a; margin-bottom: 8px; }
  p { color: #555; margin: 4px 0 24px; font-size: 14px; }
  #qr { border: 8px solid white; box-shadow: 0 4px 24px rgba(0,0,0,0.12); border-radius: 12px; }
</style>
</head>
<body>
<h2>TasGo Mobile — Expo Go</h2>
<p>Scan with your iPhone Camera app → opens Expo Go</p>
<canvas id="qr"></canvas>
<p style="margin-top:20px;font-size:12px;color:#999;">exp://falcon-regulate-simmering.ngrok-free.dev</p>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
new QRCode(document.getElementById("qr"), {
  text: "exp://falcon-regulate-simmering.ngrok-free.dev",
  width: 320,
  height: 320,
  colorDark: "#000000",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
